<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>X32 Control</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        button {
            font-size: 18px;
            padding: 12px 16px;
            margin: 8px;
            cursor: pointer;
        }

        .toggle-on {
            background: red;
            color: white;
        }

        .toggle-off {
            background: #ccc;
        }
    </style>
</head>

<body>

<div id="statusPanel">
    <span id="serverStatus">Server: ?</span>
    <span id="x32Status">X32: ?</span>
    <span id="obsStatus">OBS: ?</span>
</div>

    <h2>Sound Control Panel</h2>

    <div id="buttons"></div>
    <div id="indicators"></div>

    <h2>OBS Control Panel</h2>
    <button>Band Scene</button>
    <button>Lectern Scene</button>
    <button>Other Scene</button>
    <button>Other Scene</button>
    <button>Other Scene</button>
    <button>Other Scene</button>
    <button>Other Scene</button>
    <button>(maybe Start/Stop stream)</button>

    <h2>Camera Control Panel</h2>
    <button>Set White Balance</button>
    <button>OnePush Focus</button>
    <button>(further buttons for adjusting then saving Preset positions)</button>

    <script src="app.js"></script>

</body>
</html>
