<!DOCTYPE html>
<html>
<head>
    <title>Help</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div id="content">Loading...</div>

    <script>
        fetch('/help/help.md')
            .then(r => r.text())
            .then(md => {
                document.getElementById('content').innerHTML =
                    marked.parse(md);
            });
    </script>
</body>
</html>
