name: Build and Publish Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release ZIP
        run: npm run release

      - name: Create GitHub Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: av-helper.zip